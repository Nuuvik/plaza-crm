services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: plaza_crm
      POSTGRES_USER: plaza
      POSTGRES_PASSWORD: plaza123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plaza -d plaza_crm"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8080:2209"
    volumes:
      - ./logs:/app/logs
    environment:
      SERVER_PORT: 2209
      SPRING_APPLICATION_NAME: plaza-crm
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/plaza_crm
      SPRING_DATASOURCE_USERNAME: plaza
      SPRING_DATASOURCE_PASSWORD: plaza123
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_JPA_SHOW_SQL: false
      SPRING_JPA_OPEN_IN_VIEW: false
      SPRING_FLYWAY_ENABLED: true
      SPRING_FLYWAY_LOCATIONS: classpath:db/migration
      SPRING_DATA_WEB_PAGEABLE_DEFAULT_PAGE_SIZE: 10
      SPRING_DATA_WEB_PAGEABLE_MAX_PAGE_SIZE: 50
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
