services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: plaza_crm
      POSTGRES_USER: plaza
      POSTGRES_PASSWORD: plaza123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plaza -d plaza_crm"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "8080:2209"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/plaza_crm
      SPRING_DATASOURCE_USERNAME: plaza
      SPRING_DATASOURCE_PASSWORD: plaza123
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: